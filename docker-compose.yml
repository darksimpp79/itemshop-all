services:

  # ── Baza danych ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       itemshop_db
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d itemshop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - internal
    restart: unless-stopped

  # ── Backend Spring Boot ────────────────────────────────────────
  backend:
    build:
      context: ./itemshop-backend/itemshop
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_URL:    jdbc:postgresql://postgres:5432/itemshop_db
      UPLOAD_DIR: /uploads/products/
      # nginx ma fixed IP 172.20.0.2 — backend ufa mu jako trusted proxy
      TRUSTED_PROXY_IPS: 172.28.0.2,127.0.0.1,::1
    volumes:
      - uploads:/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── Frontend Next.js ───────────────────────────────────────────
  frontend:
    build:
      context: ./itemshop-front
      dockerfile: Dockerfile
    environment:
      NODE_ENV:              production
      ITEMSHOP_BACKEND_URL:  http://backend:8080
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx reverse proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/uploads:ro
    networks:
      internal:
        ipv4_address: 172.28.0.2   # fixed IP → TRUSTED_PROXY_IPS w backendzie
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Cloudflare Tunnel (zero otwartych portów na hoście) ────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - internal
    depends_on:
      - nginx
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads:

# ── Sieć wewnętrzna (nic nie jest wystawione na host) ──────────
networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
