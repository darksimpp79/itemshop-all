name: Itemshop
version: '$version'

main: pl.ziutek.itemshop.Itemshop
paperPluginLoader: pl.ziutek.itemshop.ItemshopLoader
api-version: '1.21.11'
load: POSTWORLD
# ... (tu są nazwa, wersja, autor itp.) ...

commands:
  magazyn:
    description: Zarzadzanie ItemShopem (odbior i przeladowanie)
