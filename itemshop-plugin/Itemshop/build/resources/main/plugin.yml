name: Itemshop
version: '1.0'

main: pl.ziutek.itemshop.Itemshop
paperPluginLoader: pl.ziutek.itemshop.ItemshopLoader
api-version: '1.21.11'
load: POSTWORLD
# ... (tu są nazwa, wersja, autor itp.) ...

commands:
  magazyn:
    description: Odbierz zakupione przedmioty z magazynu
    usage: /magazyn [nick|reload|help]
  punkty:
    description: Sprawdz swoje Punkty Chwaly
    usage: /punkty [nick]
  skrzynka:
    description: Otworz skrzynke za 500 Punktow Chwaly
    usage: /skrzynka

permissions:
  itemshop.admin:
    description: Pozwala na /magazyn reload
    default: op