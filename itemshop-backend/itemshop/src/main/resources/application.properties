spring.application.name=itemshop
server.port=8080

# Konfiguracja prawdziwej bazy danych PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/itemshop_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:admin}

# Spring sam zaktualizuje nam tabele w bazie na podstawie klas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Włączamy podgląd zapytań w konsoli IDE (pomaga przy szukaniu błędów)
spring.jpa.show-sql=true

# App config (override per env)
# Comma-separated list of allowed origins (supports patterns like http://*.localhost:3000)
app.cors.allowed-origin-patterns=https://*.pumpking.club,https://pumpking.club,http://127.0.0.1:8080,*

# Base URL of the frontend (used for redirects like Stripe success/cancel)
app.frontend.base-url=${FRONTEND_BASE_URL:https://pumpking.club}

# Public storefront rate limit (per IP + path, in-memory)
app.ratelimit.storefront.max-requests-per-minute=${STOREFRONT_RATELIMIT_RPM:120}

# Storefront cache TTLs (seconds) - in-memory Caffeine
app.cache.storefront.info-ttl-seconds=${STOREFRONT_CACHE_INFO_TTL:30}
app.cache.storefront.products-ttl-seconds=${STOREFRONT_CACHE_PRODUCTS_TTL:30}
app.cache.storefront.modes-ttl-seconds=${STOREFRONT_CACHE_MODES_TTL:30}
app.cache.storefront.top-ttl-seconds=${STOREFRONT_CACHE_TOP_TTL:15}
app.cache.storefront.recent-ttl-seconds=${STOREFRONT_CACHE_RECENT_TTL:10}

# Storefront caches (Caffeine specs)
app.cache.storefront.info.spec=${STOREFRONT_CACHE_INFO_SPEC:maximumSize=10000,expireAfterWrite=30s}
app.cache.storefront.products.spec=${STOREFRONT_CACHE_PRODUCTS_SPEC:maximumSize=10000,expireAfterWrite=30s}
app.cache.storefront.modes.spec=${STOREFRONT_CACHE_MODES_SPEC:maximumSize=10000,expireAfterWrite=30s}
app.cache.storefront.top.spec=${STOREFRONT_CACHE_TOP_SPEC:maximumSize=10000,expireAfterWrite=10s}
app.cache.storefront.recent.spec=${STOREFRONT_CACHE_RECENT_SPEC:maximumSize=10000,expireAfterWrite=5s}